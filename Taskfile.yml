version: "3"

tasks:
  generate-go-resource:
    aliases:
      - gen-go-resource
    cmds:
      - protoc -I contracts/proto contracts/proto/resource/resource.proto --go_out=./contracts/gen/go/ --go_opt=paths=source_relative --go-grpc_out=./contracts/gen/go/ --go-grpc_opt=paths=source_relative

  generate-go-sso:
    aliases:
      - gen-go-sso
    cmds:
      - protoc -I contracts/proto contracts/proto/sso/sso.proto --go_out=./contracts/gen/go/ --go_opt=paths=source_relative --go-grpc_out=./contracts/gen/go/ --go-grpc_opt=paths=source_relative

  generate-py-sso:
    aliases:
      - gen-py-sso
    cmds:
      - protoc -I contracts/proto contracts/proto/sso/sso.proto --python_out=./contracts/gen/python/ --grpc_python_out=./contracts/gen/python/

  generate-go:
    aliases:
      - gen-go
    cmds:
      - protoc -I contracts/proto contracts/proto/{{.SERVICE}}/{{.SERVICE}}.proto --go_out=./contracts/gen/go/ --go_opt=paths=source_relative --go-grpc_out=./contracts/gen/go/ --go-grpc_opt=paths=source_relative

  generate-py:
    aliases:
      - gen-py
    cmds:
      - protoc -I contracts/proto contracts/proto/{{.SERVICE}}/{{.SERVICE}}.proto --python_out=./contracts/gen/python/ --grpc_python_out=./contracts/gen/python/
